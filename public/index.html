<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Master Pro</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 20px; }
        
        /* 메인 카드 디자인 */
        .glass-card { background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { margin: 0 0 10px 0; font-size: 28px; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 검색 영역 수정 */
        .search-area { display: flex; gap: 10px; margin-bottom: 25px; align-items: stretch; }
        input { flex: 3; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 16px; min-width: 0; }
        select { flex: 1; padding: 10px; border-radius: 14px; border: 2px solid #e2e8f0; background: white; cursor: pointer; }
        
        /* 분석하기 버튼 수정 (세로 꺾임 방지) */
        .main-btn { 
            white-space: nowrap; /* 글자 꺾임 방지 */
            padding: 0 25px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: bold; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .main-btn:hover { transform: scale(1.02); }

        /* 인포 섹션 */
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; display: none; }
        .pill { background: #f1f5f9; padding: 12px; border-radius: 16px; text-align: center; border: 1px solid #e2e8f0; }
        .pill-label { font-size: 11px; color: #64748b; font-weight: bold; margin-bottom: 4px; }
        .pill-value { font-size: 14px; font-weight: 800; color: var(--primary); }

        /* 예문 카드 */
        .example-card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #f1f5f9; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .eng { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
        .kor { color: #64748b; font-size: 15px; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 8px; background: #e0e7ff; color: #4338ca; font-size: 11px; font-weight: bold; margin-top: 10px; }

        /* 학습 기록 (하단 이동) */
        .history-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; }
        .history-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { padding: 8px 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .history-item:hover { border-color: var(--primary); background: #eff6ff; }

        .loading { display: none; text-align: center; padding: 20px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h1>✨ Phrasal Verb Analyzer</h1>
        <p style="color: #64748b; margin-top: -5px; margin-bottom: 25px;">구동사 분석 및 문법 구조 확인</p>

        <div class="search-area">
            <input type="text" id="wordInput" placeholder="예: give up, look at">
            <select id="diffSelect">
                <option value="Easy">Easy</option>
                <option value="Medium" selected>Med</option>
                <option value="Hard">Hard</option>
            </select>
            <button class="main-btn" onclick="analyze()">분석하기</button>
        </div>

        <div id="loader" class="loading">AI가 문법을 분석하고 있습니다...</div>

        <div id="analysisResult" class="analysis-grid">
            <div class="pill"><div class="pill-label">유형</div><div id="resType" class="pill-value"></div></div>
            <div class="pill"><div class="pill-label">다음 단어</div><div id="resFollow" class="pill-value"></div></div>
            <div class="pill"><div class="pill-label">중간 삽입</div><div id="resSep" class="pill-value"></div></div>
        </div>

        <div id="exampleArea"></div>
    </div>

    <div class="history-card">
        <div class="history-title">
            <h3 style="margin:0">📚 최근 학습 기록</h3>
            <button onclick="clearHistory()" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:12px;">전체 삭제</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>
</div>

<script>
    let historyData = JSON.parse(localStorage.getItem('verbHistory') || '[]');
    updateHistoryUI();

    async function analyze() {
        const word = document.getElementById('wordInput').value.trim();
        const diff = document.getElementById('diffSelect').value;
        if(!word) return;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('analysisResult').style.display = 'none';
        document.getElementById('exampleArea').innerHTML = '';

        try {
            const res = await fetch(`/api/generate?word=${word}&difficulty=${diff}&count=3`);
            if(!res.ok) throw new Error("Server Error");
            const data = await res.json();
            
            display(word, data);
            saveHistory(word, data);
        } catch (e) {
            alert("분석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function display(word, data) {
        document.getElementById('analysisResult').style.display = 'grid';
        document.getElementById('resType').innerText = data.grammar_analysis.type;
        document.getElementById('resFollow').innerText = data.grammar_analysis.following_form;
        document.getElementById('resSep').innerText = data.grammar_analysis.is_separable;

        document.getElementById('exampleArea').innerHTML = data.examples.map(ex => `
            <div class="example-card">
                <div class="eng">${ex.eng}</div>
                <div class="kor">${ex.kor}</div>
                <div class="tag">${ex.structure === 'separated' ? '💡 목적어 삽입 형태' : '기본 구조'}</div>
            </div>
        `).join('');
    }

    function saveHistory(word, data) {
        historyData = historyData.filter(h => h.word !== word);
        historyData.unshift({word, data});
        localStorage.setItem('verbHistory', JSON.stringify(historyData.slice(0, 10)));
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const list = document.getElementById('historyList');
        list.innerHTML = historyData.map((h, i) => `
            <div class="history-item" onclick="loadHistory(${i})">${h.word}</div>
        `).join('');
    }

    function loadHistory(i) {
        const item = historyData[i];
        document.getElementById('wordInput').value = item.word;
        display(item.word, item.data);
    }

    function clearHistory() {
        if(confirm("기록을 삭제할까요?")) {
            localStorage.removeItem('verbHistory');
            historyData = [];
            updateHistoryUI();
        }
    }
</script>

</body>
</html>
