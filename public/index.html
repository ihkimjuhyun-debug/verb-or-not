<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Master Pro - Storage</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f3f4f6; --white: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: #1f2937; }
        .container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        .main-panel, .storage-panel { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .analysis-card { background: #fdf2f8; border: 1px solid #fbcfe8; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .example-item { border-bottom: 1px solid #f3f4f6; padding: 12px 0; }
        .example-item:last-child { border: none; }
        .eng { font-weight: 700; color: #111827; }
        .kor { color: #6b7280; font-size: 0.95rem; }

        /* 저장소 스타일 */
        .storage-panel h3 { margin-top: 0; display: flex; justify-content: space-between; }
        .vocab-list { list-style: none; padding: 0; max-height: 500px; overflow-y: auto; }
        .vocab-item { 
            padding: 10px; border-bottom: 1px solid #f3f4f6; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .vocab-item:hover { background: #f9fafb; }
        .vocab-word { font-weight: 600; color: var(--primary); }
        .vocab-date { font-size: 0.75rem; color: #9ca3af; }
        .del-btn { color: #ef4444; font-size: 0.8rem; border: none; background: none; cursor: pointer; }

        .loading { display: none; text-align: center; font-weight: bold; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-panel">
        <h2>🔍 단어 분석 & 예문</h2>
        <div class="input-group">
            <input type="text" id="word" placeholder="단어 입력 (예: put off, apply to)">
            <select id="diff">
                <option value="Easy">Easy</option>
                <option value="Medium" selected>Medium</option>
                <option value="Hard">Hard</option>
            </select>
            <button onclick="fetchData()">분석 시작</button>
        </div>

        <div id="loading" class="loading">AI가 분석 중...</div>

        <div id="analysisArea" class="analysis-card">
            <h4 id="targetWord" style="margin:0 0 10px 0; color: #be185d;"></h4>
            <div id="grammarInfo"></div>
        </div>

        <div id="resultArea"></div>
    </div>

    <div class="storage-panel">
        <h3>📚 나의 단어장 <button onclick="clearStorage()" style="font-size: 10px; background: #9ca3af;">전체삭제</button></h3>
        <ul id="vocabList" class="vocab-list">
            </ul>
    </div>
</div>

<script>
    // 1. 초기 데이터 로드
    let storage = JSON.parse(localStorage.getItem('myVocab') || '[]');
    renderVocabList();

    async function fetchData() {
        const word = document.getElementById('word').value.trim();
        const diff = document.getElementById('diff').value;
        if(!word) return;

        toggleLoading(true);

        try {
            const res = await fetch(`/api/generate?word=${word}&difficulty=${diff}&count=3`);
            const data = await res.json();
            
            displayResult(word, data);
            saveToStorage(word, data);
        } catch (e) {
            alert("분석 실패");
        } finally {
            toggleLoading(false);
        }
    }

    function displayResult(word, data) {
        // 분석 결과 표시
        const info = data.grammar_analysis;
        document.getElementById('analysisArea').style.display = 'block';
        document.getElementById('targetWord').innerText = word.toUpperCase();
        document.getElementById('grammarInfo').innerHTML = `
            <div><strong>유형:</strong> ${info.type}</div>
            <div style="color:#e11d48"><strong>"to" 성격:</strong> ${info.to_type}</div>
            <div><strong>팁:</strong> ${info.usage_tip}</div>
        `;

        // 예문 표시
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = '<h4>📝 예문 (Daily Life)</h4>' + data.examples.map(ex => `
            <div class="example-item">
                <div class="eng">${ex.eng}</div>
                <div class="kor">${ex.kor}</div>
                <div style="font-size:0.8rem; color:#10b981;">💡 ${ex.point}</div>
            </div>
        `).join('');
    }

    // 2. 저장소 로직
    function saveToStorage(word, fullData) {
        // 중복 제거 후 저장
        storage = storage.filter(item => item.word !== word);
        storage.unshift({
            word: word,
            data: fullData,
            date: new Date().toLocaleDateString()
        });
        localStorage.setItem('myVocab', JSON.stringify(storage));
        renderVocabList();
    }

    function renderVocabList() {
        const list = document.getElementById('vocabList');
        list.innerHTML = storage.map((item, index) => `
            <li class="vocab-item" onclick="loadFromStorage(${index})">
                <div>
                    <div class="vocab-word">${item.word}</div>
                    <div class="vocab-date">${item.date}</div>
                </div>
                <button class="del-btn" onclick="deleteItem(event, ${index})">삭제</button>
            </li>
        `).join('');
    }

    function loadFromStorage(index) {
        const item = storage[index];
        displayResult(item.word, item.data);
    }

    function deleteItem(e, index) {
        e.stopPropagation(); // 부모 클릭 이벤트 방지
        storage.splice(index, 1);
        localStorage.setItem('myVocab', JSON.stringify(storage));
        renderVocabList();
    }

    function clearStorage() {
        if(confirm("모든 단어를 삭제할까요?")) {
            storage = [];
            localStorage.setItem('myVocab', '[]');
            renderVocabList();
        }
    }

    function toggleLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
</script>

</body>
</html>
